name: Build PDF (szablon)

# Weryfikuje, że formatka + szablon kompilują się. W realnym projekcie
# skopiuj szablon-dokumentu/ jako paper/ i wskaż go poniżej.

on:
  push:
    paths:
      - 'szablon-dokumentu/**'
      - 'scripts/lint-math-unicode.py'
      - '.github/workflows/latex.yml'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint — matematyka zawsze w LaTeX, nigdy unicode (tex + docs)
        run: python3 scripts/lint-math-unicode.py szablon-dokumentu docs README.md AGENTS.md CHANGELOG.md

      - name: Kompilacja szablonu → PDF
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: szablon-dokumentu
          root_file: main.tex

      - name: Wystaw PDF jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: szablon-pdf
          path: szablon-dokumentu/main.pdf
          if-no-files-found: error
